<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>RIGNITC Blog | Technical Articles & Insights</title>
    <meta name="description" content="Explore technical articles, insights, and research from RIGNITC. Deep dives into robotics, AI, and cutting-edge technology." />
    <meta name="keywords" content="RIGNITC blog, technical articles, robotics, AI, technology insights, research" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="RIGNITC" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rignitc.com/blog" />
    <meta property="og:title" content="RIGNITC Blog | Technical Articles & Insights" />
    <meta property="og:description" content="Explore technical articles, insights, and research from RIGNITC." />
    <meta property="og:image" content="/assets/images/logog.webp" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://rignitc.com/blog" />
    <meta property="twitter:title" content="RIGNITC Blog | Technical Articles & Insights" />
    <meta property="twitter:description" content="Explore technical articles, insights, and research from RIGNITC." />
    <meta property="twitter:image" content="/assets/images/logog.webp" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://rignitc.com/blog" />
    
    <link rel="stylesheet" href="/src/styles/fonts.css" />
    <link rel="stylesheet" href="/src/styles/navbar.css" />
    <link rel="stylesheet" href="/src/styles/footer.css" />
    <link rel="icon" type="image/png" href="/assets/images/logog.webp" />
    <link rel="stylesheet" href="/src/styles/cursor.css" />
    <link rel="stylesheet" href="/src/styles/blog.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"
      rel="stylesheet"
    />
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Blog",
      "name": "RIGNITC Blog",
      "url": "https://rignitc.com/blog",
      "description": "Technical articles and insights from RIGNITC"
    }
    </script>
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <main>
      <section class="hero" aria-labelledby="blog-head">
        <div class="left">
          <h1 id="blog-head">Blog</h1>
          <p class="tagline">
            Technical insights, deep dives, and innovations from our team
          </p>
        </div>
      </section>
      <div class="blog-posts" id="blog-posts" aria-live="polite">
        <div class="empty" id="empty-placeholder" style="display: none">
          No blog posts found.
        </div>
      </div>
    </main>
    <div id="footer-placeholder"></div>
    <div class="cursor"></div>
    <div class="cursor-ring"></div>
    <script src="/src/scripts/cursor.js"></script>
    <script src="/src/scripts/mobile-navbar.js"></script>
    <script src="/src/scripts/componentLoader.js"></script>
    <script>
      loadComponent("navbar-placeholder", "/src/components/navbar.html");
      loadComponent("footer-placeholder", "/src/components/footer.html");
    </script>
    <script src="/src/scripts/blog.js"></script>
  </body>
</html>
