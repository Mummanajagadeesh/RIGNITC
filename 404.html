<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>RIGNITC | Page Not Found</title>
  <link rel="canonical" href="https://rignitc.com/404" />
  <link rel="icon" type="image/png" href="/RIGNITC/assets/images/logog.webp" />

  <!-- Global styles -->
  <link rel="stylesheet" href="/RIGNITC/src/styles/fonts.css" />
  <link rel="stylesheet" href="/RIGNITC/src/styles/navbar.css" />
  <link rel="stylesheet" href="/RIGNITC/src/styles/footer.css" />
  <link rel="stylesheet" href="/RIGNITC/src/styles/cursor.css" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&family=Sora:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:#000;
      --fg:#fff;
      --radius:14px;
    }

    * {
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body {
      min-height:100%;
    }

        body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto;
    }

    /* main should take remaining space */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 120px 22px;
      width: 100%;
    }

    /* footer should stretch full width */
    #footer-placeholder {
      width: 100%;
    }

    .error-art {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      margin:40px 0 20px;
    }

        .error-art img {
      filter: grayscale(100%) contrast(100%);
      width: min(680px, 92vw);
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .tagline {
      font-weight:600;
      color:rgba(255,255,255,0.85);
      margin-top:10px;
    }

    .error-message {
      font-size:1.2rem;
      color:rgba(255,255,255,.8);
      margin-bottom:24px;
    }

    .home-link {
      background:var(--fg);
      color:var(--bg);
      padding:12px 28px;
      border-radius:var(--radius);
      text-decoration:none;
      font-weight:700;
      transition:.3s ease;
    }

    .home-link:hover {
      background:rgba(255,255,255,.85);
    }

    .sr-only {
      position:absolute;
      width:1px;
      height:1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <div id="navbar-placeholder"></div>

  <!-- Main content -->
  <main>
    <h1 class="sr-only">404 — Page Not Found</h1>

    <figure class="error-art">
      <img
        src="https://rignitc.com/assets/images/main/404.webp"
        alt="Page not found illustration"
        loading="eager"
      />
    </figure>

    <div class="tagline">Oops! The page you are looking for does not exist.</div>
    <p class="error-message">
      It might have been moved or never existed.
    </p>

    <a href="https://rignitc.com" class="home-link">Go Back Home</a>
  </main>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <!-- Cursor -->
  <div class="cursor"></div>
  <div class="cursor-ring"></div>

  <!-- Scripts -->
  <script src="/RIGNITC/src/scripts/cursor.js"></script>
  <script src="/RIGNITC/src/scripts/mobile-navbar.js"></script>
  <script src="/RIGNITC/src/scripts/componentLoader.js"></script>
  <script>
    loadComponent("navbar-placeholder", "/RIGNITC/src/components/navbar.html");
    loadComponent("footer-placeholder", "/RIGNITC/src/components/footer.html");
  </script>
</body>
</html>
